# Puerto donde correrá el microservicio ms-auth
server.port=8080

# Nombre de la aplicación adaptado a nuestra arquitectura
spring.application.name=ms-auth

# URL de conexión a MySQL (apunta a la base de datos de la muni)
spring.datasource.url=jdbc:mysql://localhost:3306/db_municipalidad_auth

# Usuario de MySQL
spring.datasource.username=usuario

# Password de MySQL
spring.datasource.password=pass123

# Driver JDBC de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea ni modifica tablas, porque eso lo hará Flyway
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en consola
spring.jpa.show-sql=true

# Da formato legible al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Activa Flyway al iniciar la aplicación
spring.flyway.enabled=true

# Permite iniciar Flyway aunque ya existan tablas
spring.flyway.baseline-on-migrate=true

# Ruta donde estarán los scripts SQL de migración
spring.flyway.locations=classpath:db/migration

# Permite ejecutar flyway clean si lo haces manualmente
spring.flyway.clean-disabled=false

# Clave secreta para firmar el JWT (puedes cambiarla por seguridad)
jwt.secret=clave-secreta-municipalidad-canchas-2026-xyz

# Tiempo de duración del token en milisegundos (3600000 = 1 hora)
jwt.expiration=3600000